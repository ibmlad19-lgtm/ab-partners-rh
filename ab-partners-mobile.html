<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#060810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AB Partners"/>
<title>AB PARTNERS RH</title>
<link rel="manifest" href="#" id="manifest-link"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060810;--s1:#0D0F1C;--s2:#141628;--s3:#1C1F35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#ECEDF5;--muted:#6E7191;--soft:#9B9EBA;
  --accent:#3D7FFF;--accent2:#6A4FFF;
  --green:#00C37A;--orange:#F5A623;--red:#FF4560;--teal:#00BCD4;--purple:#9B59B6;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
  --nav-h:64px;
  --header-h:56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Outfit,sans-serif;}
::-webkit-scrollbar{display:none;}

/* ── LOGIN ───────────────────────────────────────────────────────── */
#login-screen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(160deg,#060810 0%,#0D0F1C 60%,#141628 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-box{width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:40px;}
.login-mark{
  width:64px;height:64px;border-radius:20px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 20px 40px rgba(61,127,255,0.3);
}
.login-logo h1{font-family:Fraunces,serif;font-size:24px;font-weight:700;letter-spacing:-.02em;}
.login-logo p{font-size:13px;color:var(--muted);margin-top:6px;}
.l-field{margin-bottom:16px;}
.l-field label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;}
.l-inp{
  width:100%;background:var(--s1);border:1.5px solid var(--border2);
  border-radius:14px;padding:14px 18px;color:var(--text);
  font-size:16px;font-family:Outfit,sans-serif;outline:none;transition:border-color .2s;
}
.l-inp:focus{border-color:var(--accent);}
.l-btn{
  width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;color:#fff;padding:16px;border-radius:14px;
  font-family:Outfit,sans-serif;font-size:16px;font-weight:700;cursor:pointer;
  margin-top:8px;box-shadow:0 10px 30px rgba(61,127,255,0.35);
  transition:transform .15s,box-shadow .15s;
}
.l-btn:active{transform:scale(.97);box-shadow:0 5px 15px rgba(61,127,255,0.2);}
.l-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none;}
.l-reset{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:12px;background:none;border:none;cursor:pointer;font-family:Outfit,sans-serif;text-decoration:underline;}

/* ── APP SHELL ───────────────────────────────────────────────────── */
#app{display:none;height:100%;flex-direction:column;}
#app.visible{display:flex;}

/* ── TOP HEADER ──────────────────────────────────────────────────── */
.top-header{
  height:var(--header-h);padding-top:var(--safe-top);
  background:rgba(6,8,16,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:20px;padding-right:20px;
  position:sticky;top:0;z-index:50;flex-shrink:0;
}
.top-header h1{font-family:Fraunces,serif;font-size:18px;font-weight:700;}
.top-header-right{display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);
  background:var(--s2);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:background .15s;
}
.icon-btn:active{background:var(--s3);}

/* ── PAGES ───────────────────────────────────────────────────────── */
.pages{flex:1;overflow:hidden;position:relative;}
.page{
  position:absolute;inset:0;overflow-y:auto;
  padding:16px 16px calc(var(--nav-h) + var(--safe-bot) + 16px);
  display:none;
}
.page.active{display:block;animation:fadeIn .2s ease;}

/* ── BOTTOM NAV ──────────────────────────────────────────────────── */
.bottom-nav{
  height:calc(var(--nav-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  background:rgba(13,15,28,0.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:color .2s;color:var(--muted);
  border:none;background:none;font-family:Outfit,sans-serif;
  position:relative;padding-top:8px;
}
.nav-item.active{color:var(--accent);}
.nav-item .nav-ico{font-size:22px;transition:transform .2s;}
.nav-item.active .nav-ico{transform:translateY(-2px);}
.nav-item span{font-size:10px;font-weight:600;letter-spacing:.04em;}
.nav-badge{
  position:absolute;top:6px;right:calc(50% - 18px);
  background:var(--red);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:10px;font-family:JetBrains Mono,monospace;
  min-width:16px;text-align:center;
}

/* ── CARDS & STATS ───────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{
  background:var(--s1);border:1px solid var(--border);border-radius:16px;
  padding:16px;transition:transform .15s;
}
.stat-card:active{transform:scale(.97);}
.stat-card .ico{font-size:22px;margin-bottom:8px;}
.stat-card .val{font-family:Fraunces,serif;font-size:28px;font-weight:700;line-height:1;}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:4px;}

/* ── LIST ITEMS ─────────────────────────────────────────────────── */
.emp-card{
  background:var(--s1);border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:12px;
}
.emp-card:active{background:var(--s2);transform:scale(.98);}
.emp-card.warn{border-left:3px solid var(--orange);}
.emp-card.urgent{border-left:3px solid var(--red);}
.emp-avatar{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:Fraunces,serif;font-size:15px;font-weight:700;
}
.emp-info{flex:1;min-width:0;}
.emp-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emp-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emp-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}

/* ── BADGES ─────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:JetBrains Mono,monospace;white-space:nowrap;}
.b-actif{background:rgba(0,195,122,0.15);color:var(--green);}
.b-expire{background:rgba(110,113,145,0.15);color:var(--muted);}
.b-resilie{background:rgba(255,69,96,0.15);color:var(--red);}
.type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;font-family:JetBrains Mono,monospace;}
.type-CDI{background:rgba(0,195,122,0.15);color:var(--green);}
.type-CDD{background:rgba(61,127,255,0.15);color:var(--accent);}
.type-ESSAI{background:rgba(245,166,35,0.15);color:var(--orange);}
.type-STAGE{background:rgba(0,188,212,0.15);color:var(--teal);}
.type-EXPATRIE{background:rgba(155,89,182,0.15);color:var(--purple);}

/* ── ALERT CARDS ─────────────────────────────────────────────────── */
.alert-card{
  background:var(--s1);border-left:4px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;
  transition:all .15s;
}
.alert-card:active{transform:scale(.98);}
.alert-card.danger{border-left-color:var(--red);background:rgba(255,69,96,0.06);}
.alert-card.warn{border-left-color:var(--orange);background:rgba(245,166,35,0.06);}
.alert-card .a-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.alert-card .a-ico{font-size:20px;}
.alert-card .a-title{font-size:14px;font-weight:600;flex:1;}
.alert-card .a-days{font-size:12px;font-family:JetBrains Mono,monospace;color:var(--red);font-weight:700;}
.alert-card .a-detail{font-size:12px;color:var(--muted);}
.a-actions{display:flex;gap:8px;margin-top:10px;}
.a-btn{flex:1;padding:10px 8px;border-radius:10px;border:none;font-size:12px;font-weight:700;font-family:Outfit,sans-serif;cursor:pointer;text-align:center;}
.a-btn.renouv{background:rgba(0,195,122,0.15);color:var(--green);}
.a-btn.stop{background:rgba(255,69,96,0.1);color:var(--red);}

/* ── SECTION TITLES ──────────────────────────────────────────────── */
.section-title{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;margin-top:20px;display:flex;align-items:center;gap:8px;
}
.section-title:first-child{margin-top:0;}

/* ── SEARCH BAR ──────────────────────────────────────────────────── */
.search-bar{
  position:relative;margin-bottom:16px;
}
.search-bar input{
  width:100%;background:var(--s1);border:1.5px solid var(--border2);
  border-radius:14px;padding:12px 16px 12px 42px;
  color:var(--text);font-size:15px;font-family:Outfit,sans-serif;outline:none;
}
.search-bar input:focus{border-color:var(--accent);}
.search-bar .s-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}

/* ── BOTTOM SHEET (drawer) ────────────────────────────────────────── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;
  pointer-events:none;transition:background .3s;
}
.sheet-overlay.open{background:rgba(0,0,0,0.7);pointer-events:all;}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:var(--s1);border-radius:24px 24px 0 0;
  max-height:90vh;overflow-y:auto;
  padding:0 20px calc(var(--safe-bot) + 20px);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 20px;}
.sheet-title{font-family:Fraunces,serif;font-size:20px;font-weight:700;margin-bottom:20px;}

/* ── FORM ELEMENTS ───────────────────────────────────────────────── */
.form-field{margin-bottom:16px;}
.form-field label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;}
.form-field input,.form-field select,.form-field textarea{
  width:100%;background:var(--s2);border:1.5px solid var(--border2);
  border-radius:12px;padding:13px 16px;color:var(--text);
  font-size:15px;font-family:Outfit,sans-serif;outline:none;transition:border-color .2s;
}
.form-field input:focus,.form-field select:focus{border-color:var(--accent);}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── DEPOT IT CARDS ──────────────────────────────────────────────── */
.depot-card{
  background:var(--s1);border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;
}
.depot-card:active{transform:scale(.98);}
.depot-card.not-deposited{border-left:4px solid var(--muted);}
.depot-card.pending{border-left:4px solid var(--orange);}
.depot-card.ok{border-left:4px solid var(--green);}
.depot-card.refused{border-left:4px solid var(--red);}
.depot-head{display:flex;align-items:center;gap:10px;}
.depot-info{flex:1;min-width:0;}
.depot-status{font-size:11px;font-weight:700;font-family:JetBrains Mono,monospace;}
.depot-status.s-none{color:var(--muted);}
.depot-status.s-pending{color:var(--orange);}
.depot-status.s-ok{color:var(--green);}
.depot-status.s-refused{color:var(--red);}

/* ── FILTER CHIPS ────────────────────────────────────────────────── */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border2);
  background:none;color:var(--soft);font-size:12px;font-weight:600;
  font-family:Outfit,sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.chip.active{background:rgba(61,127,255,0.15);border-color:var(--accent);color:var(--accent);}

/* ── FAB ─────────────────────────────────────────────────────────── */
.fab{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 16px);right:20px;
  width:56px;height:56px;border-radius:18px;border:none;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;font-size:24px;cursor:pointer;z-index:40;
  box-shadow:0 8px 24px rgba(61,127,255,0.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.92);box-shadow:0 4px 12px rgba(61,127,255,0.3);}

/* ── EMPTY STATE ─────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty .e-ico{font-size:48px;margin-bottom:12px;}
.empty p{font-size:14px;}

/* ── TOAST ────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 16px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s3);color:var(--text);
  padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;
  z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── CONTRACT FORM SHEET ─────────────────────────────────────────── */
.optgroup-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:10px 0 4px;
}

/* ── USER CHIP ────────────────────────────────────────────────────── */
.user-pill{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;padding:6px 12px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.user-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

/* ── D-ITEM (detail row) ─────────────────────────────────────────── */
.d-row{padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.d-row:last-child{border-bottom:none;}
.d-row .d-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;flex-shrink:0;}
.d-row .d-val{font-size:13px;text-align:right;}

.more-btn{
  background:var(--s2);border:1.5px solid var(--border2);border-radius:16px;
  padding:16px 8px;color:var(--text);font-size:24px;cursor:pointer;
  font-family:Outfit,sans-serif;transition:all .15s;text-align:center;
}
.more-btn:active{transform:scale(.95);background:var(--s3);}
.more-btn span{display:block;font-size:12px;font-weight:600;color:var(--soft);margin-top:6px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-mark">🤝</div>
      <h1>AB PARTNERS</h1>
      <p>Suivi des contrats RH</p>
    </div>
    <div class="l-field">
      <label>Identifiant</label>
      <input class="l-inp" id="l-user" type="text" placeholder="Identifiant" autocapitalize="none" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()"/>
    </div>
    <div class="l-field">
      <label>Mot de passe</label>
      <input class="l-inp" id="l-pass" type="password" placeholder="Mot de passe" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="l-err" id="l-err">Identifiant ou mot de passe incorrect</div>
    <button class="l-btn" onclick="doLogin()">Se connecter</button>
    <button class="l-reset" onclick="resetApp()">Problème de connexion ? Réinitialiser</button>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <div class="top-header">
    <h1 id="page-title">Tableau de bord</h1>
    <div class="top-header-right">
      <div id="sync-dot" title="Synchronisation" style="width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;"></div>
      <div class="user-pill" id="user-pill">
        <div class="user-dot"></div>
        <span id="user-name">—</span>
      </div>
      <div class="icon-btn" onclick="doLogout()">⏻</div>
    </div>
  </div>

  <!-- Pages -->
  <div class="pages">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid" id="dash-stats"></div>
      <div class="section-title">🔔 Alertes actives</div>
      <div id="dash-alerts-list"></div>
    </div>

    <!-- ALERTES -->
    <div class="page" id="page-alertes">
      <div class="chips" id="alert-chips">
        <button class="chip active" onclick="filterAlerts('all',this)">Toutes</button>
        <button class="chip" onclick="filterAlerts('urgent',this)">🔴 Urgentes</button>
        <button class="chip" onclick="filterAlerts('attention',this)">🟠 Attention</button>
        <button class="chip" onclick="filterAlerts('expire',this)">⏰ Expirés</button>
      </div>
      <div id="alertes-list"></div>
    </div>

    <!-- EMPLOYÉS -->
    <div class="page" id="page-employes">
      <div class="search-bar">
        <span class="s-ico">🔍</span>
        <input type="search" placeholder="Rechercher un salarié…" oninput="renderEmployesMobile(this.value)"/>
      </div>
      <div class="chips" id="emp-chips">
        <button class="chip active" onclick="filterEmps('',this)">Tous</button>
        <button class="chip" onclick="filterEmps('Actif',this)">✅ Actifs</button>
        <button class="chip" onclick="filterEmps('Expiré',this)">⏰ Expirés</button>
      </div>
      <div id="emp-list"></div>
    </div>

    <!-- CLIENTS -->
    <div class="page" id="page-clients">
      <div class="search-bar">
        <span class="s-ico">🔍</span>
        <input type="search" placeholder="Rechercher un client…" oninput="renderClientsMobile(this.value)"/>
      </div>
      <div id="clients-list"></div>
    </div>

    <!-- DÉPÔTS IT -->
    <div class="page" id="page-depotit">
      <div class="chips" id="depot-chips">
        <button class="chip active" onclick="filterDepot('',this)">Tous</button>
        <button class="chip" onclick="filterDepot('none',this)">⬜ Non déposés</button>
        <button class="chip" onclick="filterDepot('pending',this)">⏳ En attente</button>
        <button class="chip" onclick="filterDepot('ok',this)">✅ Visés</button>
      </div>
      <div id="depot-list"></div>
    </div>

  
    <!-- HISTORIQUE -->
    <div class="page" id="page-historique">
      <div class="search-bar">
        <span class="s-ico">🔍</span>
        <input type="search" placeholder="Rechercher un salarié…" oninput="renderHistoriqueMobile(this.value)"/>
      </div>
      <div id="hist-list"></div>
    </div>

    <!-- SIGNATURES -->
    <div class="page" id="page-signatures">
      <div class="chips" id="sig-chips">
        <button class="chip active" onclick="filterSig('',this)">Toutes</button>
        <button class="chip" onclick="filterSig('unsent',this)">⬜ Non envoyé</button>
        <button class="chip" onclick="filterSig('sent',this)">📤 En attente</button>
        <button class="chip" onclick="filterSig('refused',this)">❌ Refusé</button>
      </div>
      <div id="sig-list"></div>

// Afficher un indicateur de sync
function showSyncIndicator(status){
  let el = document.getElementById("sync-dot");
  if(!el) return;
  if(status === "saving"){
    el.style.background = "var(--orange)";
    el.title = "Synchronisation en cours…";
  } else if(status === "ok"){
    el.style.background = "var(--green)";
    el.title = "Données synchronisées";
  } else {
    el.style.background = "var(--red)";
    el.title = "Hors ligne — données locales";
  }
}

// ── SAVE : Firebase (avec fallback localStorage) ─────────────────────────────
function saveLocal(){
  // Sauvegarde locale immédiate (fallback)
  try{
    localStorage.setItem("cf_contrats", JSON.stringify(contrats));
    localStorage.setItem("cf_clients",  JSON.stringify(CLIENTS));
    localStorage.setItem("cf_nextClientId", String(nextClientId));
    localStorage.setItem("cf_nextId", String(nextId));
  }catch(e){}

  // Sauvegarde Firebase avec debounce
  if(!fbReady || !db) return;
  showSyncIndicator("saving");
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async ()=>{
    try{
      await db.collection("app_data").doc("main").set({
        contrats: JSON.stringify(contrats),
        clients:  JSON.stringify(CLIENTS),
        nextId,
        nextClientId,
        updatedAt: new Date().toISOString(),
      });
      showSyncIndicator("ok");
    }catch(e){
      console.error("Erreur sync Firebase:", e);
      showSyncIndicator("error");
    }
  }, SYNC_DELAY);
}

  try{
    showSyncIndicator("saving");
    const doc = await db.collection("app_data").doc("main").get();
    if(doc.exists){
      const data = doc.data();
      if(data.contrats){
        const parsed = JSON.parse(data.contrats);
        if(Array.isArray(parsed)){
          contrats = parsed;
          nextId = data.nextId || Math.max(...parsed.map(c=>c.id), nextId-1)+1;
        }
      }
      if(data.clients){
        const parsed = JSON.parse(data.clients);
        if(Array.isArray(parsed)&&parsed.length>0){
          CLIENTS.length=0;
          parsed.forEach(c=>CLIENTS.push(c));
          nextClientId = data.nextClientId || nextClientId;
        }
      }
      // Mettre à jour localStorage avec données Firebase
      localStorage.setItem("cf_contrats", JSON.stringify(contrats));
      localStorage.setItem("cf_clients",  JSON.stringify(CLIENTS));
      showSyncIndicator("ok");
      renderAll();
    } else {
      // Première utilisation : uploader les données locales vers Firebase
      showSyncIndicator("ok");
      saveLocal();
    }
  }catch(e){
    console.error("Erreur chargement Firebase:", e);
    showSyncIndicator("error");
  }

  // Écoute les changements en temps réel
  listenRealtime();
}

function loadFromLocalStorage(){
  try{
    const dc = localStorage.getItem("cf_contrats");
    if(dc){ contrats=JSON.parse(dc); nextId=Math.max(...JSON.parse(dc).map(c=>c.id),nextId-1)+1; }
    const dk = localStorage.getItem("cf_clients");
    if(dk){ const p=JSON.parse(dk); if(Array.isArray(p)&&p.length>0){CLIENTS.length=0;p.forEach(c=>CLIENTS.push(c));} }
    const dn = localStorage.getItem("cf_nextClientId");
    if(dn) nextClientId=parseInt(dn)||nextClientId;
  }catch(e){}
}

// Écoute temps réel : màj auto si quelqu'un modifie depuis un autre appareil
let unsubscribeRealtime = null;
function listenRealtime(){
  if(!fbReady||!db) return;
  if(unsubscribeRealtime) unsubscribeRealtime();
  unsubscribeRealtime = db.collection("app_data").doc("main")
    .onSnapshot(doc=>{
      if(!doc.exists) return;
      const data = doc.data();
      // Ignorer si c'est notre propre sauvegarde (< 2s)
      const updated = new Date(data.updatedAt||0);
      if(Date.now()-updated.getTime() < 2000) return;
      if(data.contrats){
        try{
          const parsed=JSON.parse(data.contrats);
          if(Array.isArray(parsed)){
            contrats=parsed;
            nextId=data.nextId||Math.max(...parsed.map(c=>c.id),nextId-1)+1;
            localStorage.setItem("cf_contrats",JSON.stringify(contrats));
          }
        }catch(e){}
      }
      if(data.clients){
        try{
          const parsed=JSON.parse(data.clients);
          if(Array.isArray(parsed)&&parsed.length>0){
            CLIENTS.length=0;parsed.forEach(c=>CLIENTS.push(c));
            nextClientId=data.nextClientId||nextClientId;
            localStorage.setItem("cf_clients",JSON.stringify(CLIENTS));
          }
        }catch(e){}
      }
      showSyncIndicator("ok");
      renderAll();
      showToast("🔄 Données mises à jour","green");
    }, err=>{ showSyncIndicator("error"); console.error("Realtime error:", err); });
}

const fmtD = d => d ? new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtDShort = d => d ? new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}) : "—";
function fmt(n){ return n ? Number(n).toLocaleString("fr-FR") + " F" : "—"; }
const clientName = id => (CLIENTS.find(c=>c.id===id)||{nom:"—"}).nom;
const client = id => CLIENTS.find(c=>c.id===id)||{};
function joursRestants(d){ return d ? Math.ceil((new Date(d)-new Date())/(864e5)) : null; }
function joursDepuis(d){ return d ? Math.floor((new Date()-new Date(d))/(864e5)) : null; }
function anciennete(debut){
  if(!debut) return "—";
  const d=new Date(debut),n=new Date();
  let a=n.getFullYear()-d.getFullYear(),m=n.getMonth()-d.getMonth();
  if(m<0){a--;m+=12;}
  return a>0 ? `${a}an${a>1?"s":""} ${m>0?m+"m":""}`.trim() : `${m}m`;
}
function avatarColor(nom){
  const cols=["#3D7FFF","#6A4FFF","#00C37A","#F5A623","#FF4560","#00BCD4","#9B59B6","#E67E22"];
  let h=0; for(let i=0;i<nom.length;i++) h=nom.charCodeAt(i)+((h<<5)-h);
  return cols[Math.abs(h)%cols.length];
}
function requiresVisaIT(t){ return /^(CDI|CDD|STAGE|EXPATRIE)/i.test(t); }
function contractFamily(t){
  if(/^STAGE/i.test(t)) return "stage";
  if(/^ESSAI/i.test(t)) return "essai";
  if(/^CDD/i.test(t))   return "cdd";
  return "other";
}
function typeBadge(t){
  const cls=(t||"").replace(/\s+/g,"-");
  return `<span class="type-badge type-${cls}">${t}</span>`;
}
function statusBadge(s){
  const m={Actif:"b-actif",Expiré:"b-expire",Résilié:"b-resilie"};
  return `<span class="badge ${m[s]||"b-expire"}">${s}</span>`;
}
function contratDureeJours(c){
  if(!c.dateDebut||!c.dateFin) return 0;
  return Math.ceil((new Date(c.dateFin)-new Date(c.dateDebut))/(864e5));
}
function familyDureeJours(c){
  const key=c.salKey||(c.nom+c.prenom+c.clientId), fam=contractFamily(c.type);
  return contrats.filter(x=>(x.salKey||(x.nom+x.prenom+x.clientId))===key&&contractFamily(x.type)===fam)
    .reduce((s,x)=>s+contratDureeJours(x),0);
}
function isFamilyExhausted(c){
  if(/^CDD 2$/i.test(c.type)&&c.renouvellements>=1) return true;
  if(/^ESSAI 2$/i.test(c.type)&&c.renouvellements>=1) return true;
  const j=familyDureeJours(c);
  if(/^CDD/i.test(c.type)&&j>=730) return true;
  if(/^ESSAI/i.test(c.type)&&j>=183) return true;
  if(/^STAGE/i.test(c.type)&&j>=730) return true;
  return false;
}
function isSuperseded(c){
  return contrats.some(x=>x.id!==c.id&&x.statut==="Actif"&&
    (x.salKey===c.salKey||(x.nom===c.nom&&x.prenom===c.prenom&&x.clientId===c.clientId)));
}
function nextContractType(c){
  const type=typeof c==="string"?c:c.type;
  const r=typeof c==="string"?0:(c.renouvellements||0);
  if(/^ESSAI 1/i.test(type)) return r>=1?"CDD 1":"ESSAI 2";
  if(/^ESSAI 2/i.test(type)) return "CDD 1";
  if(/^CDD 1/i.test(type))   return r>=1?"CDI":"CDD 2";
  if(/^CDD 2/i.test(type))   return "CDI";
  if(/^STAGE 1/i.test(type)) return "STAGE 2";
  if(/^STAGE 2/i.test(type)) return "CDD 1";
  if(/^EXPATRIE/i.test(type)) return "EXPATRIE";
  return "CDI";
}
function showToast(msg, type="green"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.background=type==="red"?"rgba(255,69,96,0.9)":type==="orange"?"rgba(245,166,35,0.9)":"rgba(0,195,122,0.9)";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

// ──────────────────────────────────────────────────────────────────
// ALERTS
// ──────────────────────────────────────────────────────────────────
function getAlertes(){
  const alerts=[];
  contrats.forEach(c=>{
    if(c.statut!=="Actif") return;
    if(!c.dateFin) return;
    const jr=joursRestants(c.dateFin);
    const hasSuccessor=contrats.some(x=>x.id!==c.id&&x.statut==="Actif"&&
      (x.salKey===c.salKey||(x.nom===c.nom&&x.prenom===c.prenom&&x.clientId===c.clientId)));
    if(hasSuccessor) return;
    const canRenew=c.type!=="CDI";
    if(jr!==null&&jr<=30&&jr>=0)
      alerts.push({type:"urgent",emp:c,cli:client(c.clientId),jr,canRenew,level:"danger",icon:"🔴"});
    else if(jr!==null&&jr<=60&&jr>=0)
      alerts.push({type:"attention",emp:c,cli:client(c.clientId),jr,canRenew,level:"warn",icon:"🟠"});
  });
  // Expirés sans décision
  contrats.forEach(c=>{
    if(c.statut!=="Expiré") return;
    if(c.depart) return;
    if(isSuperseded(c)) return;
    const jd=c.dateFin?joursDepuis(c.dateFin):null;
    if(jd===null||jd<0) return;
    alerts.push({type:"expire",emp:c,cli:client(c.clientId),jd,canRenew:c.type!=="CDI",level:"danger",icon:"🔴",isExpired:true});
  });
  return alerts;
}

let currentUser=null;

function doLogin(){
  const login=document.getElementById("l-user").value.trim();
  const pass=document.getElementById("l-pass").value;
  try{
    const pwds=JSON.parse(localStorage.getItem("cf_pwds")||"{}");
    USERS.forEach(u=>{if(pwds[u.id])u.password=pwds[u.id];});
  }catch(e){}
  const user=USERS.find(u=>u.login.toLowerCase()===login.toLowerCase()&&u.password===pass);
  if(!user){
    const e=document.getElementById("l-err"); e.style.display="block";
    document.getElementById("l-pass").value="";
    setTimeout(()=>e.style.display="none",3000); return;
  }
  currentUser=user;
  try{sessionStorage.setItem("cf_mob_session",JSON.stringify({id:user.id,login:user.login}));}catch(e){}
  document.getElementById("l-err").style.display="none";
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").classList.add("visible");
  document.getElementById("user-name").textContent=user.nom;
  loadLocal();
  renderAll();
}

  if(!confirm("Se déconnecter ?")) return;
  currentUser=null;
  try{sessionStorage.removeItem("cf_mob_session");}catch(e){}
  document.getElementById("app").classList.remove("visible");
  document.getElementById("login-screen").style.display="flex";

}

function checkSession(){
  try{
    const pwds=JSON.parse(localStorage.getItem("cf_pwds")||"{}");
    USERS.forEach(u=>{if(pwds[u.id])u.password=pwds[u.id];});
    const s=sessionStorage.getItem("cf_mob_session");
    if(s){
      const saved=JSON.parse(s);
      const user=USERS.find(u=>u.id===saved.id&&u.login===saved.login);
      if(user){
        currentUser=user;
        document.getElementById("login-screen").style.display="none";
        document.getElementById("app").classList.add("visible");
        document.getElementById("user-name").textContent=user.nom;
        loadLocal(); renderAll(); return;

    }
  }catch(e){}
}

function buildAlertCard(a){
  const c=a.emp, cli=a.cli;
  const name=`${c.civilite||""} ${c.prenom} ${c.nom}`.trim();
  const sub=`${c.poste} · ${cli.nom||"—"}`;
  let msg="", days="";
  if(a.isExpired){
    msg=`Expiré depuis ${a.jd}j — décision requise`;
  } else {
    msg=`Fin dans ${a.jr} jour${a.jr>1?"s":""}`;
    days=`${a.jr}j`;
  }
  const actions=a.canRenew?`
    <div class="a-actions">
      <button class="a-btn renouv" onclick="event.stopPropagation();openRenouvSheet(${c.id})">🔄 Renouveler</button>
      <button class="a-btn stop" onclick="event.stopPropagation();openDetail(${c.id})">🚶 Voir dossier</button>
    </div>`:`
    <div class="a-actions">
      <button class="a-btn stop" onclick="event.stopPropagation();openDetail(${c.id})">👁 Voir le dossier</button>
    </div>`;
  return `<div class="alert-card ${a.level}" onclick="openDetail(${c.id})">
    <div class="a-head">
      <span class="a-ico">${a.icon}</span>
      <div class="a-title">${name}</div>
      ${days?`<div class="a-days">${days}</div>`:""}
    </div>
    <div class="a-detail">${sub} · ${typeBadge(c.type)}</div>
    <div class="a-detail" style="margin-top:3px">${msg}</div>
    ${actions}
  </div>`;
}

    const match=`${c.nom} ${c.prenom} ${c.poste}`.toLowerCase().includes(q)||clientName(c.clientId).toLowerCase().includes(q);
    if(!match) return false;
    if(empFilter) return c.statut===empFilter;
    if(c.statut==="Actif") return true;
    if(c.statut==="Expiré"&&!c.depart&&!isSuperseded(c)) return true;

  }).sort((a,b)=>a.nom.localeCompare(b.nom));

function filterDepot(status, btn){
  depotFilter=status;
  document.querySelectorAll("#depot-chips .chip").forEach(c=>c.classList.remove("active"));
  btn.classList.add("active");
  renderDepotMobile();
}

function renderDepotMobile(){
  let rows=contrats.filter(c=>requiresVisaIT(c.type)&&c.statut==="Actif");
  if(depotFilter==="none") rows=rows.filter(c=>!c.visaDepot);
  else if(depotFilter) rows=rows.filter(c=>c.visaDepot&&(c.visaStatut||"pending")===depotFilter);
  rows.sort((a,b)=>(b.visaDepot||"").localeCompare(a.visaDepot||""));

  // Update badge
  const nbOverdue=rows.filter(c=>(!c.visaStatut||c.visaStatut==="pending")&&c.visaDepot&&joursDepuis(c.visaDepot)>30).length;
  const nbNone=contrats.filter(c=>requiresVisaIT(c.type)&&c.statut==="Actif"&&!c.visaDepot).length;
  const nb=nbOverdue+nbNone;
  const nbEl=document.getElementById("nb-depot");
  nbEl.textContent=nb; nbEl.style.display=nb?"inline":"none";

  const el=document.getElementById("depot-list");
  if(!rows.length){
    el.innerHTML=`<div class="empty"><div class="e-ico">🏛️</div><p>Aucun contrat trouvé</p></div>`; return;
  }
  el.innerHTML=rows.map(c=>{
    const jd=c.visaDepot?joursDepuis(c.visaDepot):null;
    const isOverdue=jd!==null&&jd>30&&(!c.visaStatut||c.visaStatut==="pending");
    const statusKey=!c.visaDepot?"none":(c.visaStatut||"pending");
    const statusMap={none:["⬜ Non déposé","s-none","not-deposited"],pending:["⏳ En attente","s-pending","pending"],ok:["✅ Visé","s-ok","ok"],refused:["❌ Refusé","s-refused","refused"]};
    const [statusLbl,statusCls,cardCls]=statusMap[statusKey]||statusMap.pending;
    return `<div class="depot-card ${cardCls}" onclick="openDepotSheet(${c.id})">
      <div class="depot-head">
        <div class="depot-info">
          <div class="emp-name">${c.prenom} ${c.nom}</div>
          <div class="emp-sub">${c.poste} · ${clientName(c.clientId)} · ${typeBadge(c.type)}</div>
          ${c.visaRef?`<div style="font-size:11px;color:var(--accent);font-family:JetBrains Mono,monospace;margin-top:4px">${c.visaRef}</div>`:""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="depot-status ${statusCls}">${statusLbl}</div>
          ${c.visaDepot?`<div style="font-size:11px;color:var(--muted);margin-top:4px">${fmtDShort(c.visaDepot)}</div>`:""}
          ${isOverdue?`<div style="font-size:10px;color:var(--red);font-weight:700">+${jd}j ⚠️</div>`:""}
        </div>
      </div>
    </div>`;
  }).join("");
}

let renouvId=null;

function openRenouvSheet(id){
  renouvId=id;
  const c=contrats.find(x=>x.id===id);
  if(!c) return;
  const next=nextContractType(c);
  const exhausted=isFamilyExhausted(c);
  if(exhausted){
    const jours=familyDureeJours(c);
    const info=/^CDD/i.test(c.type)?`CDD arrivé à terme (${Math.round(jours/30)}m/24m max)`:/^ESSAI/i.test(c.type)?`Essai terminé (${jours}j/183j max)`:`Stage max atteint`;
    showToast("ℹ️ "+info,"green");
  }

  // Build type options based on exhaustion
  const typeOpts=exhausted
    ?[{v:"CDI",l:"CDI"},{v:"EXPATRIE",l:"EXPATRIE"}]
    :[
      {v:next,l:next+" (suggéré)"},
      ...["CDI","EXPATRIE","CDD 1","CDD 2","ESSAI 1","ESSAI 2","STAGE 1","STAGE 2"]
        .filter(t=>t!==next).map(t=>({v:t,l:t}))
    ];

  const today=new Date().toISOString().slice(0,10);
  document.getElementById("detail-content").innerHTML=`
    <div class="sheet-title">🔄 ${exhausted?"Passage en CDI":"Renouvellement"}</div>
    <div style="padding:12px 14px;border-radius:12px;background:var(--s2);margin-bottom:20px;font-size:13px;">
      Contrat actuel : ${typeBadge(c.type)} → <strong>${next}</strong>
    </div>
    <div class="form-field">
      <label>Type du nouveau contrat</label>
      <select id="rv-type">${typeOpts.map(o=>`<option value="${o.v}">${o.l}</option>`).join("")}</select>
    </div>
    <div class="form-grid-2">
      <div class="form-field">
        <label>Date de début</label>
        <input id="rv-debut" type="date" value="${c.dateFin||today}"/>
      </div>
      <div class="form-field">
        <label>Date de fin</label>
        <input id="rv-fin" type="date"/>
      </div>
    </div>
    <div class="form-field">
      <label>Nouveau salaire (laisser vide si inchangé)</label>
      <input id="rv-sal" type="number" placeholder="${c.salaire}"/>
    </div>
    <div style="display:flex;gap:12px;padding-bottom:8px;">
      <button onclick="closeSheet('detail')" style="flex:1;padding:14px;border-radius:14px;border:1.5px solid var(--border2);background:none;color:var(--soft);font-size:15px;font-weight:700;font-family:Outfit,sans-serif;cursor:pointer;">Annuler</button>
      <button onclick="confirmRenouvMobile()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),#00a866);color:#fff;font-size:15px;font-weight:700;font-family:Outfit,sans-serif;cursor:pointer;">✅ Confirmer</button>
    </div>
  `;
  openSheet("detail");
}

function confirmRenouvMobile(){
  if(!renouvId) return;
  const old=contrats.find(x=>x.id===renouvId);
  if(!old) return;
  const newDebut=document.getElementById("rv-debut").value;
  if(!newDebut){showToast("Date de début obligatoire","red");return;}
  const newType=document.getElementById("rv-type").value;
  const newFin=document.getElementById("rv-fin").value;
  const newSal=Number(document.getElementById("rv-sal").value)||old.salaire;
  const sameFam=contractFamily(old.type)===contractFamily(newType);
  const newRenouv=sameFam?old.renouvellements+1:0;

  // Archive old
  contrats=contrats.map(c=>{
    if(c.id!==renouvId) return c;
    return {...c,statut:"Expiré",dateFin:c.dateFin||newDebut};
  });
  // Create new
  contrats.push({
    ...old,id:nextId++,type:newType,dateDebut:newDebut,dateFin:newFin||"",
    statut:"Actif",salaire:newSal,renouvellements:newRenouv,
    visaStatut:"none",visaRef:"",visaDepot:"",visaDate:"",visaObs:"",visaRegion:"",visaMode:"",
    sigStatut:"unsent",sigEnvoi:"",sigRetour:"",sigMode:"",sigObs:"",sigRelances:[],
    depart:undefined,historique:[...(old.historique||[])],
  });
  saveLocal();
  closeSheet("detail");
  renderAll();
  showToast(`✅ Renouvelé — ${old.type} → ${newType}`,"green");
}

function selectClientEmoji(em){

  CLIENT_EMOJIS.forEach(e=>{

function saveClientMobile(){
  const nom = document.getElementById("cl-nom").value.trim();
  if(!nom){ showToast("Le nom du client est obligatoire","red"); return; }

  if(editingClientId){
    CLIENTS = CLIENTS.map(c=>{
      if(c.id!==editingClientId) return c;
      return {
        ...c,
        nom,
        secteur:   document.getElementById("cl-secteur").value.trim(),
        contact:   document.getElementById("cl-contact").value.trim(),
        telephone: document.getElementById("cl-tel").value.trim(),
        email:     document.getElementById("cl-email").value.trim(),
        adresse:   document.getElementById("cl-adresse").value.trim(),
        couleur:   document.getElementById("cc-selected").value,
        emoji:     document.getElementById("ce-selected").value,
      };
    });
    showToast("✅ Client modifié","green");
  } else {
    const newId = "c" + nextClientId++;
    CLIENTS.push({
      id: newId,
      nom,
      secteur:   document.getElementById("cl-secteur").value.trim(),
      contact:   document.getElementById("cl-contact").value.trim(),
      telephone: document.getElementById("cl-tel").value.trim(),
      email:     document.getElementById("cl-email").value.trim(),
      adresse:   document.getElementById("cl-adresse").value.trim(),
      couleur:   document.getElementById("cc-selected").value,
      emoji:     document.getElementById("ce-selected").value,
    });
    showToast("✅ Client créé","green");
  }
  saveLocal();
  closeSheet("client");
  renderAll();
}

function deleteContratMobile(id){
  const c = contrats.find(x=>x.id===id);
  if(!c) return;
  if(!confirm(`Supprimer le contrat de ${c.prenom} ${c.nom} ?

Cette action est irréversible.`)) return;
  contrats = contrats.filter(x=>x.id!==id);
  saveLocal();
  closeSheet("detail");
  renderAll();
  showToast("🗑️ Contrat supprimé","red");
}

function deleteClientMobile(id){
  const c = CLIENTS.find(x=>x.id===id);
  if(!c) return;
  const nbContrats = contrats.filter(x=>x.clientId===id).length;
  if(nbContrats>0){
    showToast(`Impossible — ${nbContrats} contrat${nbContrats>1?"s":""} lié${nbContrats>1?"s":""}. Supprimez d'abord les contrats.`,"red");
    return;
  }
  if(!confirm(`Supprimer le client "${c.nom}" ?

Cette action est irréversible.`)) return;
  CLIENTS = CLIENTS.filter(x=>x.id!==id);
  saveLocal();
  closeSheet("detail");
  renderAll();
  showToast("🗑️ Client supprimé","red");
}

function renderHistoriqueMobile(q){
  q=(q||"").toLowerCase();
  // Grouper par salarié (salKey ou nom+prenom+client)
  const map={};
  contrats.forEach(c=>{
    const key=c.salKey||(c.nom+c.prenom+c.clientId);
    if(!map[key]) map[key]={nom:c.nom,prenom:c.prenom,civilite:c.civilite||"",clientId:c.clientId,contrats:[]};
    map[key].contrats.push(c);
  });
  let salaries=Object.values(map).filter(s=>{
    const name=`${s.prenom} ${s.nom}`.toLowerCase();
    return !q||name.includes(q)||clientName(s.clientId).toLowerCase().includes(q);
  }).sort((a,b)=>a.nom.localeCompare(b.nom));

  const el=document.getElementById("hist-list");
  if(!salaries.length){el.innerHTML=`<div class="empty"><div class="e-ico">📜</div><p>Aucun historique</p></div>`;return;}

  el.innerHTML=salaries.map(s=>{
    const col=avatarColor(s.nom);
    const actif=s.contrats.find(c=>c.statut==="Actif");
    const total=s.contrats.length;
    return `<div class="emp-card" onclick="openHistDetail('${s.nom}','${s.prenom}','${s.clientId}')">
      <div class="emp-avatar" style="background:${col}22;color:${col}">${(s.prenom[0]||"")+(s.nom[0]||"")}</div>
      <div class="emp-info">
        <div class="emp-name">${s.prenom} ${s.nom}</div>
        <div class="emp-sub">${clientName(s.clientId)}</div>
      </div>
      <div class="emp-right">
        ${actif?typeBadge(actif.type):`<span class="badge b-expire">Inactif</span>`}
        <span style="font-size:10px;color:var(--muted)">${total} contrat${total>1?"s":""}</span>
      </div>
    </div>`;
  }).join("");
}

let sigFilter="";
function filterSig(status,btn){
  sigFilter=status;
  document.querySelectorAll("#sig-chips .chip").forEach(c=>c.classList.remove("active"));
  btn.classList.add("active");
  renderSignaturesMobile();
}

function renderSignaturesMobile(){
  const SIG={unsent:{ico:"⬜",lbl:"Non envoyé",col:"var(--muted)"},sent:{ico:"📤",lbl:"En attente",col:"var(--orange)"},signed:{ico:"✅",lbl:"Signé",col:"var(--green)"},refused:{ico:"❌",lbl:"Refusé",col:"var(--red)"}};
  // Uniquement les contrats ACTIFS dont la signature n'est PAS encore finalisée
  let rows=contrats.filter(c=>c.statut==="Actif" && (c.sigStatut||"unsent")!=="signed");
  if(sigFilter) rows=rows.filter(c=>(c.sigStatut||"unsent")===sigFilter);
  rows.sort((a,b)=>(b.sigEnvoi||"").localeCompare(a.sigEnvoi||""));
  const el=document.getElementById("sig-list");
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="e-ico">✍️</div><p>Aucune signature trouvée</p></div>`;return;}
  el.innerHTML=rows.map(c=>{
    const sig=SIG[c.sigStatut||"unsent"];
    const jd=c.sigEnvoi?joursDepuis(c.sigEnvoi):null;
    return `<div class="emp-card ${c.sigStatut==="refused"?"urgent":jd!==null&&jd>7&&c.sigStatut==="sent"?"warn":""}" onclick="openDetail(${c.id})">
      <div class="emp-avatar" style="background:${avatarColor(c.nom)}22;color:${avatarColor(c.nom)}">${(c.prenom[0]||"")+(c.nom[0]||"")}</div>
      <div class="emp-info">
        <div class="emp-name">${c.prenom} ${c.nom}</div>
        <div class="emp-sub">${c.poste} · ${clientName(c.clientId)}</div>
        ${c.sigEnvoi?`<div style="font-size:11px;color:var(--muted);margin-top:2px">Envoyé le ${fmtDShort(c.sigEnvoi)}${jd!==null?` (${jd}j)`:""}</div>`:""}
      </div>
      <div class="emp-right">
        ${typeBadge(c.type)}
        <span style="font-size:11px;color:${sig.col};font-weight:600">${sig.ico} ${sig.lbl}</span>
      </div>
    </div>`;
  }).join("");
}

const MOTIFS_LABELS={demission:"Démission",fin:"Fin de contrat",licenciement:"Licenciement",retraite:"Retraite",deces:"Décès",rupture:"Rupture conventionnelle",abandon:"Abandon de poste"};
const MOTIFS_ICONS={demission:"🚶",fin:"📅",licenciement:"⚠️",retraite:"🏖️",deces:"🕊️",rupture:"🤝",abandon:"🏃"};

function renderDepartsMobile(q){
  q=(q||"").toLowerCase();
  let rows=contrats.filter(c=>(c.statut==="Expiré"||c.statut==="Résilié")&&c.depart)
    .filter(c=>`${c.nom} ${c.prenom}`.toLowerCase().includes(q)||clientName(c.clientId).toLowerCase().includes(q))
    .sort((a,b)=>(b.depart?.date||"").localeCompare(a.depart?.date||""));
  const el=document.getElementById("dep-list");
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="e-ico">🚪</div><p>Aucun départ enregistré</p></div>`;return;}

  // Stats rapides
  const total=rows.length;
  const complets=rows.filter(c=>{
    const rel=DOCS_SORTIE.filter(d=>!d.conditional||docVisible(d,c.depart?.motif||"fin",c.type));
    return rel.every(d=>c.depart?.docs?.[d.key]?.done);
  }).length;

  el.innerHTML=`
    <div class="stats-grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px;">
      <div class="stat-card" style="border-left:3px solid var(--accent)"><div class="ico">🚪</div><div class="val" style="color:var(--accent)">${total}</div><div class="lbl">Départs</div></div>
      <div class="stat-card" style="border-left:3px solid var(--green)"><div class="ico">✅</div><div class="val" style="color:var(--green)">${complets}</div><div class="lbl">Dossiers complets</div></div>
    </div>
    ${rows.map(c=>{
      const dep=c.depart||{};
      const rel=DOCS_SORTIE.filter(d=>!d.conditional||docVisible(d,dep.motif||"fin",c.type));
      const doneCount=rel.filter(d=>dep.docs?.[d.key]?.done).length;
      const pct=Math.round((doneCount/rel.length)*100);
      const col=avatarColor(c.nom);
      const motifIco=MOTIFS_ICONS[dep.motif||"fin"]||"🚪";
      return `<div class="emp-card" onclick="openDepartDetail(${c.id})">
        <div class="emp-avatar" style="background:${col}22;color:${col}">${(c.prenom[0]||"")+(c.nom[0]||"")}</div>
        <div class="emp-info">
          <div class="emp-name">${c.prenom} ${c.nom}</div>
          <div class="emp-sub">${c.poste} · ${clientName(c.clientId)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${motifIco} ${MOTIFS_LABELS[dep.motif||"fin"]||dep.motif} · ${dep.date?fmtDShort(dep.date):"—"}</div>
        </div>
        <div class="emp-right">
          ${typeBadge(c.type)}
          <div style="font-size:10px;margin-top:4px;color:${pct===100?"var(--green)":"var(--orange)"}">Docs: ${doneCount}/${rel.length}</div>
          <div style="width:48px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:3px;">
            <div style="width:${pct}%;height:100%;background:${pct===100?"var(--green)":"var(--orange)"};"></div>
          </div>
        </div>
      </div>`;
    }).join("")}`;
}

function openDepartDetail(id){
  const c=contrats.find(x=>x.id===id);
  if(!c||!c.depart) return;
  const dep=c.depart;
  const col=avatarColor(c.nom);
  const rel=DOCS_SORTIE.filter(d=>!d.conditional||docVisible(d,dep.motif||"fin",c.type));
  document.getElementById("detail-content").innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="width:48px;height:48px;border-radius:14px;background:${col}22;color:${col};display:flex;align-items:center;justify-content:center;font-family:Fraunces,serif;font-size:18px;font-weight:700">${(c.prenom[0]||"")+(c.nom[0]||"")}</div>
      <div><div style="font-family:Fraunces,serif;font-size:18px;font-weight:700">${c.prenom} ${c.nom}</div><div style="font-size:12px;color:var(--muted)">${c.poste} · ${clientName(c.clientId)}</div></div>
    </div>
    <div style="background:var(--s2);border-radius:14px;padding:14px;margin-bottom:16px;">
      <div class="d-row"><span class="d-lbl">Motif</span><span class="d-val">${MOTIFS_ICONS[dep.motif||"fin"]} ${MOTIFS_LABELS[dep.motif||"fin"]||dep.motif}</span></div>
      <div class="d-row"><span class="d-lbl">Date de départ</span><span class="d-val">${fmtD(dep.date)}</span></div>
      ${dep.obs?`<div class="d-row"><span class="d-lbl">Observations</span><span class="d-val" style="font-size:12px">${dep.obs}</span></div>`:""}
    </div>
    <div class="section-title" style="margin-top:0">Documents de sortie</div>
    ${rel.map(doc=>{
      const remise=dep.docs?.[doc.key]?.remise||{};
      const it=dep.docs?.[doc.key]?.it||{};
      const done=dep.docs?.[doc.key]?.done;
      return `<div style="background:var(--s2);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid ${done?"var(--green)":"var(--border)"}">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">${doc.lbl} ${done?"✅":"⏳"}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;color:var(--muted);">
          <div><div style="font-weight:700;color:var(--green);margin-bottom:2px">Remise salarié</div>${remise.date?fmtDShort(remise.date):"Non remis"}<br/>${remise.decharge==="oui"?"Décharge ✅":"Décharge ⬜"}</div>
          ${doc.itRequired!==false?`<div><div style="font-weight:700;color:var(--accent);margin-bottom:2px">Dépôt IT</div>${it.depot?fmtDShort(it.depot):"Non déposé"}<br/>${it.statut==="ok"?"Visé ✅":it.statut==="pending"?"En attente ⏳":"Non soumis ⬜"}</div>`:`<div><div style="font-weight:700;color:var(--muted);margin-bottom:2px">Dépôt IT</div><em>Non requis</em></div>`}
        </div>
      </div>`;
    }).join("")}
  `;
  openSheet("detail");
}

// ──────────────────────────────────────────────────────────────────
// AVENANTS
// ──────────────────────────────────────────────────────────────────
function renderAvenantsMobile(q){
  q=(q||"").toLowerCase();
  const rows=[];
  contrats.forEach(c=>{
    (c.avenants||[]).forEach((av,i)=>{
      if(!q||`${c.prenom} ${c.nom} ${av.ref||""}`.toLowerCase().includes(q))
        rows.push({c,av,i});
    });
  });
  rows.sort((a,b)=>(b.av.date||"").localeCompare(a.av.date||""));
  const el=document.getElementById("av-list");
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="e-ico">📝</div><p>Aucun avenant</p></div>`;return;}
  el.innerHTML=rows.map(({c,av})=>{
    const col=avatarColor(c.nom);
    const changes=[];
    if(av.sections?.salaire&&av.sections.salaire.ancienSalaire) changes.push("💰 Salaire");
    if(av.sections?.poste&&av.sections.poste.nouveauPoste) changes.push("📌 Poste");
    if(av.sections?.avantages) changes.push("🎁 Avantages");
    if(av.sections?.horaire) changes.push("⏰ Horaire");
    if(av.sections?.lieu) changes.push("📍 Lieu");
    if(av.sections?.duree) changes.push("📅 Durée");
    return `<div class="emp-card">
      <div class="emp-avatar" style="background:${col}22;color:${col}">${(c.prenom[0]||"")+(c.nom[0]||"")}</div>
      <div class="emp-info">
        <div class="emp-name">${av.ref||"Avenant"}</div>
        <div class="emp-sub">${c.prenom} ${c.nom} · ${clientName(c.clientId)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${changes.join(" · ")||"—"}</div>
      </div>
      <div class="emp-right">
        <span style="font-size:11px;color:var(--muted);font-family:JetBrains Mono,monospace">${av.date?fmtDShort(av.date):"—"}</span>
        <span style="font-size:11px;color:${av.visaStatut==="ok"?"var(--green)":av.visaStatut==="pending"?"var(--orange)":"var(--muted)"}">${av.visaStatut==="ok"?"✅ Visé":av.visaStatut==="pending"?"⏳ IT":"⬜ IT"}</span>
      </div>
    </div>`;
  }).join("");
}

// ──────────────────────────────────────────────────────────────────
// DAMT
// ──────────────────────────────────────────────────────────────────
function damtMobileYear(d){damtYear+=d;renderDAMTMobile();}

function renderDAMTMobile(){
  document.getElementById("damt-year-m").textContent=damtYear;
  const ys=new Date(damtYear,0,1), ye=new Date(damtYear,11,31);

  const entrees=contrats.filter(c=>c.dateDebut&&new Date(c.dateDebut)>=ys&&new Date(c.dateDebut)<=ye);
  const sorties=contrats.filter(c=>c.dateFin&&new Date(c.dateFin)>=ys&&new Date(c.dateFin)<=ye&&c.statut!=="Actif");
  const renouvs=contrats.filter(c=>c.renouvellements>0&&c.dateDebut&&new Date(c.dateDebut)>=ys&&new Date(c.dateDebut)<=ye);

  document.getElementById("damt-stats-m").innerHTML=[
    {ico:"↗️",val:entrees.length,lbl:"Entrées",col:"var(--green)"},
    {ico:"↙️",val:sorties.length,lbl:"Sorties",col:"var(--red)"},
    {ico:"🔄",val:renouvs.length,lbl:"Renouvellements",col:"var(--accent)"},
    {ico:"👥",val:contrats.filter(c=>c.statut==="Actif").length,lbl:"Actifs au 31/12",col:"var(--soft)"},
  ].map(s=>`<div class="stat-card" style="border-left:3px solid ${s.col}"><div class="ico">${s.ico}</div><div class="val" style="color:${s.col}">${s.val}</div><div class="lbl">${s.lbl}</div></div>`).join("");

  const all=[
    ...entrees.map(c=>({...c,_mvt:"entree",_date:c.dateDebut})),
    ...sorties.map(c=>({...c,_mvt:"sortie",_date:c.dateFin})),
  ].sort((a,b)=>b._date.localeCompare(a._date));

  const el=document.getElementById("damt-list-m");
  if(!all.length){el.innerHTML=`<div class="empty"><div class="e-ico">📊</div><p>Aucun mouvement en ${damtYear}</p></div>`;return;}
  el.innerHTML=all.map(c=>{
    const col=avatarColor(c.nom);
    const isEntree=c._mvt==="entree";
    return `<div class="emp-card" onclick="openDetail(${c.id})">
      <div class="emp-avatar" style="background:${col}22;color:${col}">${(c.prenom[0]||"")+(c.nom[0]||"")}</div>
      <div class="emp-info">
        <div class="emp-name">${c.prenom} ${c.nom}</div>
        <div class="emp-sub">${c.poste} · ${clientName(c.clientId)}</div>
      </div>
      <div class="emp-right">
        ${typeBadge(c.type)}
        <span style="font-size:11px;font-weight:700;color:${isEntree?"var(--green)":"var(--red)"}">${isEntree?"↗️ Entrée":"↙️ Sortie"}</span>
        <span style="font-size:10px;color:var(--muted);font-family:JetBrains Mono,monospace">${fmtDShort(c._date)}</span>
      </div>
    </div>`;
  }).join("");
}

// ──────────────────────────────────────────────────────────────────
// ÉTAT 1024
// ──────────────────────────────────────────────────────────────────
function e1024MobileYear(d){e1024Year+=d;renderEtat1024Mobile();}
function calcParts(nbEpoux,nbEnfants){
  return Math.min(1+(Number(nbEpoux)||0)*0.5+(Number(nbEnfants)||0)*0.5,5).toFixed(1).replace(".0","");
}
function getSexe(civ){if(civ==="Mme"||civ==="Mlle")return "F";if(civ==="M.")return "M";return "—";}

function renderEtat1024Mobile(){
  document.getElementById("e1024-year-m").textContent=e1024Year;
  const ys=new Date(e1024Year,0,1), ye=new Date(e1024Year,11,31);
  const rows=contrats.filter(c=>{
    if(!c.dateDebut) return false;
    if(new Date(c.dateDebut)>ye) return false;
    if(c.dateFin&&new Date(c.dateFin)<ys) return false;
    return true;
  }).sort((a,b)=>a.nom.localeCompare(b.nom));

  const actifs=rows.filter(c=>!c.dateFin||new Date(c.dateFin)>ye);
  const sortis=rows.filter(c=>c.dateFin&&new Date(c.dateFin)<=ye);

  document.getElementById("e1024-stats-m").innerHTML=[
    {ico:"👥",val:rows.length,lbl:"Total",col:"var(--accent)"},
    {ico:"✅",val:actifs.length,lbl:"Présents fin d'année",col:"var(--green)"},
    {ico:"🚪",val:sortis.length,lbl:"Sortis en cours",col:"var(--orange)"},
    {ico:"👶",val:rows.reduce((s,c)=>s+(Number(c.nbEnfants)||0),0),lbl:"Enfants",col:"var(--teal)"},
  ].map(s=>`<div class="stat-card" style="border-left:3px solid ${s.col}"><div class="ico">${s.ico}</div><div class="val" style="color:${s.col}">${s.val}</div><div class="lbl">${s.lbl}</div></div>`).join("");

  function buildList(list,col){
    if(!list.length) return `<div class="empty" style="padding:20px"><div class="e-ico">👤</div><p>Aucun salarié</p></div>`;
    return list.map(c=>{
      const parts=calcParts(c.nbEpoux,c.nbEnfants);
      return `<div class="emp-card" onclick="openDetail(${c.id})">
        <div class="emp-avatar" style="background:${avatarColor(c.nom)}22;color:${avatarColor(c.nom)};font-size:12px;width:38px;height:38px;border-radius:10px">${(c.prenom[0]||"")+(c.nom[0]||"")}</div>
        <div class="emp-info">
          <div class="emp-name" style="font-size:13px">${c.prenom} ${c.nom}</div>
          <div class="emp-sub" style="font-size:11px">${clientName(c.clientId)} · ${getSexe(c.civilite)} · ${c.nationalite||"—"}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:1px">${c.matrimonial||"—"} · ${c.nbEnfants||0} enf. · ${parts} parts</div>
        </div>
        <div class="emp-right">
          ${typeBadge(c.type)}
          <span style="font-size:10px;color:${col};font-family:JetBrains Mono,monospace">${fmtDShort(c.dateDebut)}${c.dateFin?" → "+fmtDShort(c.dateFin):""}</span>
        </div>
      </div>`;
    }).join("");
  }
  document.getElementById("e1024-actifs-m").innerHTML=buildList(actifs,"var(--green)");
  document.getElementById("e1024-sortis-m").innerHTML=buildList(sortis,"var(--orange)");
}

// ──────────────────────────────────────────────────────────────────
// DASMO
// ──────────────────────────────────────────────────────────────────
function renderDasmoMobile(){
  const actifs=contrats.filter(c=>c.statut==="Actif");
  const sn=actifs.filter(c=>c.nationalite==="Sénégalaise"||!c.nationalite).length;
  const et=actifs.filter(c=>c.nationalite&&c.nationalite!=="Sénégalaise").length;
  const h=actifs.filter(c=>c.civilite==="M.").length;
  const f=actifs.filter(c=>c.civilite==="Mme"||c.civilite==="Mlle").length;

  document.getElementById("dasmo-content-m").innerHTML=`
    <div class="stats-grid" style="margin-bottom:20px;">
      <div class="stat-card" style="border-left:3px solid var(--accent)"><div class="ico">👥</div><div class="val" style="color:var(--accent)">${actifs.length}</div><div class="lbl">Effectif total</div></div>
      <div class="stat-card" style="border-left:3px solid var(--green)"><div class="ico">🇸🇳</div><div class="val" style="color:var(--green)">${sn}</div><div class="lbl">Sénégalais</div></div>
      <div class="stat-card" style="border-left:3px solid var(--orange)"><div class="ico">🌍</div><div class="val" style="color:var(--orange)">${et}</div><div class="lbl">Étrangers</div></div>
      <div class="stat-card" style="border-left:3px solid var(--teal)"><div class="ico">👶</div><div class="val" style="color:var(--teal)">${actifs.reduce((s,c)=>s+(Number(c.nbEnfants)||0),0)}</div><div class="lbl">Enfants</div></div>
    </div>
    <div class="section-title" style="margin-top:0">Répartition H/F par type</div>
    ${["CDI","EXPATRIE","CDD 1","CDD 2","ESSAI 1","ESSAI 2","STAGE 1","STAGE 2"].map(type=>{
      const list=actifs.filter(c=>c.type===type);
      if(!list.length) return "";
      const hh=list.filter(c=>c.civilite==="M.").length;
      const ff=list.filter(c=>c.civilite==="Mme"||c.civilite==="Mlle").length;
      return `<div style="background:var(--s2);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
        <div>${typeBadge(type)}</div>
        <div style="display:flex;gap:16px;font-size:13px;">
          <span>👨 <strong>${hh}</strong></span>
          <span>👩 <strong>${ff}</strong></span>
          <span style="color:var(--muted)">= <strong>${list.length}</strong></span>
        </div>
      </div>`;
    }).join("")}
    <div class="section-title">Répartition par nationalité</div>
    ${Object.entries(actifs.reduce((acc,c)=>{const n=c.nationalite||"Sénégalaise";acc[n]=(acc[n]||0)+1;return acc;},{}))
      .sort((a,b)=>b[1]-a[1])
      .map(([nat,nb])=>`<div style="background:var(--s2);border-radius:12px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px">${nat}</span>
        <span style="font-family:JetBrains Mono,monospace;font-size:13px;font-weight:700;color:var(--accent)">${nb}</span>
      </div>`).join("")}
    <div style="height:20px"></div>
  `;
}
